<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Seller Analytics | LocalMart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            background: #f7f9fc;
        }

        /* --- New Responsive Classes --- */
        .analytics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .analytics-filter-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .inquiry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .analytics-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .analytics-filter-group {
                flex-direction: column;
                width: 100%;
                align-items: stretch;
            }

            .analytics-filter-group input,
            .analytics-filter-group select {
                width: 100%;
            }

            .inquiry-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .inquiry-header select {
                width: 100%;
            }

            .chart-container {
                padding: 1rem;
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .chart-container {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .bar {
            height: 30px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            padding-left: 0.5rem;
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">LocalMart</a>
        <ul class="nav-links">
            <li><a href="dashboard.html">← Back to Dashboard</a></li>
            <li><a href="marketplace.html">Marketplace</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="analytics-header">
            <h1>Seller Analytics</h1>
            <div class="analytics-filter-group">
                <input type="date" id="dateFilter" class="form-control" title="Pick a specific date"
                    style="padding: 0.5rem; border-radius: 8px; border: 1px solid #e2e8f0; font-weight: 600; cursor: pointer;">
                <select id="timeFilter" class="form-control"
                    style="padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid #e2e8f0; font-weight: 600; cursor: pointer;">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="week">This Week (Last 7 Days)</option>
                    <option value="15days">Last 15 Days</option>
                    <option value="month">This Month (Last 30 Days)</option>
                </select>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">Total Revenue</p>
                <p class="stat-value" id="totalRevenue">₹0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Total Orders</p>
                <p class="stat-value" id="totalOrders">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Active Products</p>
                <p class="stat-value" id="activeProducts">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Avg Order Value</p>
                <p class="stat-value" id="avgOrderValue">₹0</p>
            </div>
        </div>

        <div class="chart-container">
            <h2>Top 5 Products by Sales</h2>
            <div id="topProductsChart"></div>
            <p id="noSalesMsg" style="color: var(--muted); display: none;">No sales data yet</p>
            <div class="chart-container" style="margin-top: 2rem;">
                <div class="inquiry-header">
                    <h2 style="margin: 0;">Visit Inquiries</h2>
                    <select id="inquiryFilter" class="form-control"
                        style="padding: 0.4rem; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.9em; cursor: pointer; font-weight: 600;">
                        <option value="all">All Inquiries</option>
                        <option value="pending">Pending Only</option>
                        <option value="sold">Sold Only</option>
                        <option value="unsold">Unsold Only</option>
                    </select>
                </div>
                <div id="inquiryConversionChart" style="margin-bottom: 2rem;"></div>
                <div id="inquiriesList"></div>
                <p id="noInquiriesMsg" style="color: var(--muted); display: none;">No inquiries yet</p>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="supabase-config.js"></script>
        <script>
            let sellerId = null;

            supabase.auth.onAuthStateChange(async (event, session) => {
                console.log("Auth State Changed: ", event, session ? "Session exists" : "No session");
                if (!session) {
                    window.location.href = 'index.html';
                    return;
                }
                sellerId = session.user.id;
                loadAnalytics();
            });

            document.getElementById('timeFilter').addEventListener('change', () => {
                document.getElementById('dateFilter').value = '';
                loadAnalytics();
            });

            document.getElementById('dateFilter').addEventListener('change', () => {
                document.getElementById('timeFilter').value = 'all';
                loadAnalytics();
            });

            document.getElementById('inquiryFilter').addEventListener('change', () => {
                loadAnalytics();
            });

            async function loadAnalytics() {
                console.log("loadAnalytics triggered. Fetching orders/products...");
                try {
                    // Get all orders containing seller's products
                    const { data: orders, error: ordersError } = await supabase
                        .from('orders')
                        .select('*');

                    const { data: products, error: productsError } = await supabase
                        .from('products')
                        .select('*')
                        .eq('seller_id', sellerId);

                    if (ordersError) { console.error("Orders Error:", ordersError); throw ordersError; }
                    if (productsError) { console.error("Products Error:", productsError); throw productsError; }

                    console.log(`Fetched ${orders.length} orders & ${products.length} active products.`);

                    // Apply Time Filter
                    const dateFilterValue = document.getElementById('dateFilter').value;
                    const filterValue = document.getElementById('timeFilter').value;
                    const now = new Date();
                    let filteredOrders = orders;

                    if (dateFilterValue) {
                        filteredOrders = orders.filter(order => {
                            const orderLocal = new Date(order.created_at);
                            const orderYear = orderLocal.getFullYear();
                            const orderMonth = String(orderLocal.getMonth() + 1).padStart(2, '0');
                            const orderDay = String(orderLocal.getDate()).padStart(2, '0');
                            return `${orderYear}-${orderMonth}-${orderDay}` === dateFilterValue;
                        });
                    } else if (filterValue !== 'all') {
                        const cutoffDate = new Date();
                        if (filterValue === 'today') {
                            cutoffDate.setHours(0, 0, 0, 0);
                        } else if (filterValue === 'week') {
                            cutoffDate.setDate(now.getDate() - 7);
                        } else if (filterValue === '15days') {
                            cutoffDate.setDate(now.getDate() - 15);
                        } else if (filterValue === 'month') {
                            cutoffDate.setDate(now.getDate() - 30);
                        }

                        filteredOrders = orders.filter(order => {
                            const orderDate = new Date(order.created_at);
                            return orderDate >= cutoffDate;
                        });
                    }

                    const sellerProductIds = products.map(p => p.id);
                    const productMap = {};
                    products.forEach(p => {
                        productMap[p.id] = { ...p, sales: 0, revenue: 0 };
                    });

                    let totalRevenue = 0;
                    let totalOrders = 0;

                    filteredOrders.forEach(order => {
                        // For visit inquiries, only calculate in revenue if explicitly marked "sold"
                        const isVisitInquiry = order.status === 'visit_inquiry';
                        const isSold = order.local_status === 'sold';

                        if (isVisitInquiry && !isSold) {
                            return; // Skip unsold or unassigned visit inquiries from revenue calculations
                        }
                        if (order.items && Array.isArray(order.items)) {
                            order.items.forEach(item => {
                                // Check if this item belongs to this seller
                                if (item.seller_id === sellerId) {
                                    totalOrders++;
                                    const itemRevenue = (item.price || 0) * (item.quantity || 0);
                                    totalRevenue += itemRevenue;

                                    if (productMap[item.id]) {
                                        productMap[item.id].sales += item.quantity || 0;
                                        productMap[item.id].revenue += itemRevenue;
                                    }
                                }
                            });
                        }
                    });

                    // Update stats
                    document.getElementById('totalRevenue').textContent = `₹${totalRevenue.toLocaleString()}`;
                    document.getElementById('totalOrders').textContent = totalOrders;
                    document.getElementById('activeProducts').textContent = products.length;
                    document.getElementById('avgOrderValue').textContent = totalOrders > 0 ? `₹${Math.round(totalRevenue / totalOrders).toLocaleString()}` : '₹0';

                    // Top products chart
                    const topProducts = Object.values(productMap)
                        .sort((a, b) => b.sales - a.sales)
                        .slice(0, 5);

                    if (topProducts.length > 0 && topProducts[0].sales > 0) {
                        const maxSales = topProducts[0].sales;
                        document.getElementById('topProductsChart').innerHTML = topProducts.map(product => {
                            const width = (product.sales / maxSales) * 100;
                            return `
                        <div style="margin: 1rem 0;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                <span><strong>${product.title || 'Untitled'}</strong></span>
                                <span style="color: var(--muted);">${product.sales} sold | ₹${(product.revenue || 0).toLocaleString()}</span>
                            </div>
                            <div class="bar" style="width: ${width}%;">
                                ${width > 20 ? width.toFixed(0) + '%' : ''}
                            </div>
                        </div>
                    `;
                        }).join('');
                        document.getElementById('noSalesMsg').style.display = 'none';
                        document.getElementById('topProductsChart').style.display = 'block';
                    } else {
                        document.getElementById('topProductsChart').style.display = 'none';
                        document.getElementById('noSalesMsg').style.display = 'block';
                    }

                    // Render Inquiries & Conversion Chart
                    const inquiriesContainer = document.getElementById('inquiriesList');
                    const conversionContainer = document.getElementById('inquiryConversionChart');
                    const inquiryFilterVal = document.getElementById('inquiryFilter').value;
                    let renderedHtml = '';

                    let totalInquiriesCount = 0;
                    let soldInquiriesCount = 0;
                    let unsoldInquiriesCount = 0;

                    filteredOrders.filter(o => o.status === 'visit_inquiry').forEach(inquiry => {
                        const itemsArray = Array.isArray(inquiry.items) ? inquiry.items : [inquiry.items];
                        // Find the specific item meant for this seller
                        const item = itemsArray.find(i => i && i.seller_id === sellerId);

                        if (!item) return; // Skip if no matching item found

                        const buyer = item.buyer_details || { name: 'Unknown', email: 'N/A', mobile: 'N/A' };
                        const date = new Date(inquiry.created_at).toLocaleDateString();

                        totalInquiriesCount++;
                        if (inquiry.local_status === 'sold') soldInquiriesCount++;
                        if (inquiry.local_status === 'unsold') unsoldInquiriesCount++;

                        // Apply the UI filter (we still want the total counts for the chart)
                        if (inquiryFilterVal === 'sold' && inquiry.local_status !== 'sold') return;
                        if (inquiryFilterVal === 'unsold' && inquiry.local_status !== 'unsold') return;
                        if (inquiryFilterVal === 'pending' && (inquiry.local_status === 'sold' || inquiry.local_status === 'unsold')) return;

                        renderedHtml += `
                        <div style="padding: 1rem; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 1rem; background: #fff;">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                                <div>
                                    <strong>${buyer.name}</strong> 
                                    <span style="color: var(--muted); font-size: 0.9em; margin-left: 0.5rem;">${date}</span>
                                </div>
                                
                                <div style="display: flex; gap: 0.5rem; align-items: center;">
                                    ${inquiry.local_status ? `
                                        <span style="padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85em; font-weight: bold; 
                                                     background: ${inquiry.local_status === 'sold' ? '#10b981' : '#ef4444'}; 
                                                     color: white;">
                                            ${inquiry.local_status === 'sold' ? '✓ Sold' : '✗ Unsold'}
                                        </span>
                                    ` : `
                                        <button onclick="toggleInquiryStatus('${inquiry.id}', 'sold')" 
                                                style="padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8em; font-weight: bold; border: 1px solid #10b981; cursor: pointer; transition: all 0.2s; background: white; color: #10b981;">
                                            ✓ Sold
                                        </button>
                                        <button onclick="toggleInquiryStatus('${inquiry.id}', 'unsold')" 
                                                style="padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8em; font-weight: bold; border: 1px solid #ef4444; cursor: pointer; transition: all 0.2s; background: white; color: #ef4444;">
                                            ✗ Unsold
                                        </button>
                                    `}
                                </div>
                            </div>
                            <div style="margin-bottom: 0.5rem;">
                                <span style="background: #e0e7ff; color: #4338ca; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.85em;">
                                    Product: ${item.title || 'Unknown Product'} - ₹${(item.price || 0).toLocaleString()}
                                </span>
                            </div>
                            <div style="color: var(--muted); font-size: 0.95em;">
                                📧 ${buyer.email} <br>
                                📞 ${buyer.mobile}
                            </div>
                        </div>
                        `;
                    });

                    if (renderedHtml) {
                        inquiriesContainer.innerHTML = renderedHtml;
                        document.getElementById('noInquiriesMsg').style.display = 'none';
                        conversionContainer.style.display = 'block';
                        console.log("Inquiries rendered to DOM successfully!");

                        // Render Conversion Chart
                        const pendingCount = totalInquiriesCount - soldInquiriesCount - unsoldInquiriesCount;
                        const soldPct = totalInquiriesCount > 0 ? (soldInquiriesCount / totalInquiriesCount) * 100 : 0;
                        const unsoldPct = totalInquiriesCount > 0 ? (unsoldInquiriesCount / totalInquiriesCount) * 100 : 0;
                        const pendingPct = totalInquiriesCount > 0 ? (pendingCount / totalInquiriesCount) * 100 : 0;

                        conversionContainer.innerHTML = `
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9em; font-weight: 600;">
                                <span style="color: #10b981;">Sold: ${soldInquiriesCount}</span>
                                <span style="color: #64748b;">Pending: ${pendingCount}</span>
                                <span style="color: #ef4444;">Unsold: ${unsoldInquiriesCount}</span>
                            </div>
                            <div style="width: 100%; height: 12px; background: #e2e8f0; border-radius: 6px; display: flex; overflow: hidden;">
                                <div style="width: ${soldPct}%; background: #10b981; transition: width 0.5s ease;"></div>
                                <div style="width: ${pendingPct}%; background: #94a3b8; transition: width 0.5s ease;"></div>
                                <div style="width: ${unsoldPct}%; background: #ef4444; transition: width 0.5s ease;"></div>
                            </div>
                            <div style="text-align: center; margin-top: 0.5rem; font-size: 0.85em; color: var(--muted);">
                                Total Inquiries: ${totalInquiriesCount}
                            </div>
                        `;
                    } else {
                        inquiriesContainer.innerHTML = '';
                        conversionContainer.innerHTML = '';
                        conversionContainer.style.display = 'none';
                        document.getElementById('noInquiriesMsg').style.display = 'block';
                        console.log("Zero inquiries match, showing empty message");
                    }

                } catch (error) {
                    console.error("CRITICAL ERROR loading analytics:", error);
                    alert("Error loading data! See console.");
                }
            }

            window.toggleInquiryStatus = async function (orderId, newStatus) {
                try {
                    const statusVal = newStatus === 'null' ? null : newStatus;
                    const { error } = await supabase
                        .from('orders')
                        .update({ local_status: statusVal })
                        .eq('id', orderId);

                    if (error) throw error;

                    // Reload the analytics to refresh the UI and recalculate the top numbers
                    loadAnalytics();
                } catch (err) {
                    console.error("Error updating inquiry status:", err);
                    alert("Failed to update status.");
                }
            };
        </script>


</body>

</html>
